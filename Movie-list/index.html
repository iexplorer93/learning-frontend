<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie List APP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wdth@0,75..100;1,75..100&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <p class="header__badge">СПИСОК ФИЛЬМОВ</p>
      <p class="header__badge">2026</p>
      <h1 class="header__title">Посмотреть</h1>
  </div>
  </header>
  <main>
    <section class="movie">
      <div class="container">
        <div class="movie-inner">
          <div class="movie__search-wrapper">
            <input type="text" class="movie__search-input" placeholder="Добавить фильм">
            <button class="movie__search-button">
              <svg class="icon-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <ul class="movie__list"></ul>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
